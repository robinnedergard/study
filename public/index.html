<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CompTIA Security+ Acronym Quiz</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      text-align: center;
      padding: 2rem 1rem 1rem;
    }
    header h1 {
      font-size: 1.8rem;
      color: #38bdf8;
    }
    header p {
      color: #94a3b8;
      margin-top: 0.3rem;
    }
    .container {
      max-width: 640px;
      width: 100%;
      padding: 0 1rem 3rem;
    }

    /* Setup screen */
    #setup {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
      margin-top: 1.5rem;
    }
    #setup label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 600;
      color: #cbd5e1;
    }
    #setup select, #setup input[type="number"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 1rem;
      margin-bottom: 1.2rem;
    }
    #setup button {
      width: 100%;
      padding: 0.8rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #setup button:hover { background: #1d4ed8; }

    /* Progress */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      margin: 1.5rem 0 0.5rem;
      overflow: hidden;
    }
    .progress-bar .fill {
      height: 100%;
      background: #38bdf8;
      transition: width 0.3s;
    }
    .progress-text {
      text-align: right;
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 1rem;
    }

    /* Question card */
    #quiz { display: none; }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 2rem;
    }
    .category-badge {
      display: inline-block;
      background: #334155;
      color: #94a3b8;
      font-size: 0.75rem;
      padding: 0.2rem 0.7rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    .acronym {
      font-size: 3rem;
      font-weight: 800;
      color: #38bdf8;
      text-align: center;
      padding: 1rem 0 1.5rem;
      letter-spacing: 0.05em;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .option-btn {
      padding: 1rem 1.2rem;
      background: #0f172a;
      border: 2px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
    }
    .option-btn:hover:not(.answered) {
      border-color: #38bdf8;
      background: #172554;
    }
    .option-btn.correct {
      border-color: #22c55e;
      background: #14532d;
      color: #bbf7d0;
    }
    .option-btn.wrong {
      border-color: #ef4444;
      background: #450a0a;
      color: #fca5a5;
    }
    .option-btn.dimmed {
      opacity: 0.4;
    }
    .option-btn.answered { cursor: default; }

    .feedback {
      margin-top: 1rem;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .feedback.correct {
      background: #14532d;
      color: #4ade80;
      display: block;
    }
    .feedback.wrong {
      background: #450a0a;
      color: #f87171;
      display: block;
    }

    .explanation-box {
      margin-top: 1rem;
      padding: 1rem 1.2rem;
      background: #0f172a;
      border-left: 3px solid #38bdf8;
      border-radius: 0 8px 8px 0;
      color: #cbd5e1;
      font-size: 0.9rem;
      line-height: 1.5;
      display: none;
    }
    .explanation-box.visible { display: block; }
    .explanation-box .explanation-label {
      font-weight: 700;
      color: #38bdf8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    #next-btn {
      margin-top: 1.2rem;
      width: 100%;
      padding: 0.8rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: none;
    }
    #next-btn:hover { background: #1d4ed8; }

    /* Results */
    #results {
      display: none;
      text-align: center;
    }
    #results .card { padding: 2.5rem 2rem; }
    .score-circle {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 6px solid #334155;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .score-circle .pct {
      font-size: 2.5rem;
      font-weight: 800;
      color: #38bdf8;
    }
    .score-circle .label {
      font-size: 0.8rem;
      color: #94a3b8;
    }
    .score-circle.great { border-color: #22c55e; }
    .score-circle.great .pct { color: #22c55e; }
    .score-circle.ok { border-color: #eab308; }
    .score-circle.ok .pct { color: #eab308; }
    .score-circle.bad { border-color: #ef4444; }
    .score-circle.bad .pct { color: #ef4444; }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }
    .stat-item .num { font-size: 1.5rem; font-weight: 700; }
    .stat-item .label { font-size: 0.8rem; color: #94a3b8; }

    .missed-list {
      text-align: left;
      margin-top: 1.5rem;
    }
    .missed-list h3 {
      margin-bottom: 0.8rem;
      color: #f87171;
    }
    .missed-item {
      background: #0f172a;
      padding: 0.8rem 1rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    .missed-item strong { color: #38bdf8; }

    #restart-btn {
      margin-top: 1.5rem;
      padding: 0.8rem 2rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #restart-btn:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <header>
    <h1>CompTIA Security+ SY0-701</h1>
    <p>Acronym Quiz</p>
  </header>

  <div class="container">
    <!-- Setup -->
    <div id="setup">
      <label for="category">Category</label>
      <select id="category"><option value="all">All Categories</option></select>

      <label for="count">Number of Questions</label>
      <input type="number" id="count" value="20" min="5" max="140" />

      <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Quiz -->
    <div id="quiz">
      <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text"></div>
      <div class="card">
        <span class="category-badge" id="q-category"></span>
        <div class="acronym" id="q-acronym"></div>
        <div class="options" id="options"></div>
        <div class="feedback" id="feedback"></div>
        <div class="explanation-box" id="explanation">
          <div class="explanation-label">What is it?</div>
          <div id="explanation-text"></div>
        </div>
        <button id="next-btn" onclick="nextQuestion()">Next</button>
      </div>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="card">
        <h2 style="margin-bottom:1.5rem">Quiz Complete!</h2>
        <div class="score-circle" id="score-circle">
          <span class="pct" id="score-pct"></span>
          <span class="label">score</span>
        </div>
        <div class="stats">
          <div class="stat-item"><div class="num" id="stat-correct" style="color:#22c55e"></div><div class="label">Correct</div></div>
          <div class="stat-item"><div class="num" id="stat-wrong" style="color:#ef4444"></div><div class="label">Wrong</div></div>
          <div class="stat-item"><div class="num" id="stat-total"></div><div class="label">Total</div></div>
        </div>
        <div class="missed-list" id="missed-list"></div>
        <button id="restart-btn" onclick="restart()">Try Again</button>
      </div>
    </div>
  </div>

  <script>
    let questions = [];
    let current = 0;
    let correctCount = 0;
    let missed = [];

    // Load categories
    fetch("/api/categories")
      .then((r) => r.json())
      .then((cats) => {
        const sel = document.getElementById("category");
        cats.forEach((c) => {
          const opt = document.createElement("option");
          opt.value = c;
          opt.textContent = c;
          sel.appendChild(opt);
        });
      });

    function startQuiz() {
      const category = document.getElementById("category").value;
      const count = document.getElementById("count").value;
      fetch(`/api/quiz?count=${count}&category=${category}`)
        .then((r) => r.json())
        .then((data) => {
          questions = data;
          current = 0;
          correctCount = 0;
          missed = [];
          document.getElementById("setup").style.display = "none";
          document.getElementById("quiz").style.display = "block";
          showQuestion();
        });
    }

    function showQuestion() {
      const q = questions[current];
      document.getElementById("q-acronym").textContent = q.acronym;
      document.getElementById("q-category").textContent = q.category;
      document.getElementById("feedback").className = "feedback";
      document.getElementById("feedback").textContent = "";
      document.getElementById("explanation").classList.remove("visible");
      document.getElementById("next-btn").style.display = "none";

      const pct = (current / questions.length) * 100;
      document.getElementById("progress-fill").style.width = pct + "%";
      document.getElementById("progress-text").textContent = `${current + 1} / ${questions.length}`;

      const optionsEl = document.getElementById("options");
      optionsEl.innerHTML = "";
      q.options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.className = "option-btn";
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(btn, opt, q.correctAnswer);
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(btn, selected, correct) {
      const allBtns = document.querySelectorAll(".option-btn");
      allBtns.forEach((b) => b.classList.add("answered"));

      const fb = document.getElementById("feedback");

      if (selected === correct) {
        btn.classList.add("correct");
        fb.className = "feedback correct";
        fb.textContent = "Correct!";
        correctCount++;
      } else {
        btn.classList.add("wrong");
        fb.className = "feedback wrong";
        fb.textContent = `Wrong! The answer is: ${correct}`;
        missed.push(questions[current]);
        // Highlight the correct one
        allBtns.forEach((b) => {
          if (b.textContent === correct) b.classList.add("correct");
          else if (!b.classList.contains("wrong")) b.classList.add("dimmed");
        });
      }

      // Dim non-selected, non-correct buttons
      allBtns.forEach((b) => {
        if (!b.classList.contains("correct") && !b.classList.contains("wrong")) {
          b.classList.add("dimmed");
        }
      });

      document.getElementById("explanation-text").textContent = questions[current].explanation;
      document.getElementById("explanation").classList.add("visible");
      document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        showResults();
      } else {
        showQuestion();
      }
    }

    function showResults() {
      document.getElementById("quiz").style.display = "none";
      document.getElementById("results").style.display = "block";

      const pct = Math.round((correctCount / questions.length) * 100);
      document.getElementById("score-pct").textContent = pct + "%";
      document.getElementById("stat-correct").textContent = correctCount;
      document.getElementById("stat-wrong").textContent = questions.length - correctCount;
      document.getElementById("stat-total").textContent = questions.length;

      const circle = document.getElementById("score-circle");
      circle.className = "score-circle " + (pct >= 80 ? "great" : pct >= 60 ? "ok" : "bad");

      const missedEl = document.getElementById("missed-list");
      if (missed.length) {
        missedEl.innerHTML = "<h3>Review These:</h3>" +
          missed.map((m) =>
            `<div class="missed-item"><strong>${m.acronym}</strong> &mdash; ${m.correctAnswer}<div style="margin-top:0.4rem;font-size:0.85rem;color:#94a3b8">${m.explanation}</div></div>`
          ).join("");
      } else {
        missedEl.innerHTML = "<p style='color:#22c55e;font-weight:600'>Perfect score! Well done!</p>";
      }
    }

    function restart() {
      document.getElementById("results").style.display = "none";
      document.getElementById("setup").style.display = "block";
    }
  </script>
</body>
</html>
